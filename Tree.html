<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Tree — Tesselate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e2e8f0;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    background: rgba(15,15,26,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #1e1e30;
  }

  .nav-brand {
    font-weight: 800;
    font-size: 1rem;
    background: linear-gradient(135deg, #7c3aed, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }

  .nav-divider { width: 1px; height: 20px; background: #2d2d50; }

  .nav-title {
    font-size: 0.9rem;
    color: #64748b;
    font-weight: 500;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    pointer-events: none;
  }

  /* Tall div that makes the page scrollable */
  #scroll-area { height: 6000px; }

  /* Top intro text */
  #intro {
    position: fixed;
    top: 76px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.6s;
    white-space: nowrap;
  }

  #intro h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  #intro p {
    font-size: 0.82rem;
    color: #475569;
  }

  /* Scroll hint arrow */
  #scroll-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.78rem;
    color: #334155;
    pointer-events: none;
    transition: opacity 0.6s;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }

  /* Depth HUD at bottom */
  #hud {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  #depth-label {
    font-size: 0.7rem;
    color: #334155;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  #depth-bar {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .depth-pip {
    width: 20px;
    height: 3px;
    border-radius: 2px;
    background: #1e1e30;
    transition: background 0.35s, box-shadow 0.35s;
  }

  .depth-pip.active {
    background: #10b981;
    box-shadow: 0 0 6px rgba(16,185,129,0.6);
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Tesselate</a>
  <div class="nav-divider"></div>
  <span class="nav-title">Fractal Tree</span>
</nav>

<canvas id="tree-canvas"></canvas>
<div id="scroll-area"></div>

<div id="intro">
  <h1>Recursive Tree</h1>
  <p>Each branch spawns two children &nbsp;·&nbsp; scroll to grow</p>
</div>

<div id="scroll-hint">↓ &nbsp; scroll to recurse &nbsp; ↓</div>

<div id="hud">
  <div id="depth-label">Recursion Depth: <span id="depth-num">1</span></div>
  <div id="depth-bar"></div>
</div>

<script>
  const MAX_DEPTH = 12;
  const SCROLL_PER_LEVEL = 460;

  const canvas = document.getElementById('tree-canvas');
  const ctx = canvas.getContext('2d');
  const depthBar = document.getElementById('depth-bar');
  const depthNum = document.getElementById('depth-num');
  const intro = document.getElementById('intro');
  const scrollHint = document.getElementById('scroll-hint');

  // Build depth pips
  for (let i = 0; i < MAX_DEPTH; i++) {
    const pip = document.createElement('div');
    pip.className = 'depth-pip';
    pip.id = 'pip-' + i;
    depthBar.appendChild(pip);
  }

  // Interpolate a color along a multi-stop palette based on depth fraction
  function branchColor(depth, maxDepth) {
    const stops = [
      [120, 80, 40],   // warm brown — trunk
      [30,  90, 30],   // dark green
      [22, 163, 74],   // green
      [16, 185, 129],  // emerald
      [6,  182, 212],  // cyan
      [186, 230, 253], // pale blue — tips
    ];
    const t = depth / Math.max(1, maxDepth);
    const scaled = t * (stops.length - 1);
    const i = Math.min(Math.floor(scaled), stops.length - 2);
    const f = scaled - i;
    const a = stops[i], b = stops[i + 1];
    const r = Math.round(a[0] + (b[0] - a[0]) * f);
    const g = Math.round(a[1] + (b[1] - a[1]) * f);
    const bl = Math.round(a[2] + (b[2] - a[2]) * f);
    return 'rgb(' + r + ',' + g + ',' + bl + ')';
  }

  // Recursive branch draw
  function branch(x, y, angle, len, depth, maxDepth) {
    if (depth > maxDepth) return;

    const endX = x + Math.cos(angle) * len;
    const endY = y + Math.sin(angle) * len;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = branchColor(depth, maxDepth);
    ctx.lineWidth = Math.max(0.5, (maxDepth - depth + 1) * 1.4);
    ctx.stroke();

    // Small dot at each leaf tip for bloom effect
    if (depth === maxDepth) {
      ctx.beginPath();
      ctx.arc(endX, endY, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = branchColor(depth, maxDepth);
      ctx.fill();
    }

    const childLen = len * 0.72;
    const spread = 0.42; // ~24 degrees

    branch(endX, endY, angle - spread, childLen, depth + 1, maxDepth);
    branch(endX, endY, angle + spread, childLen, depth + 1, maxDepth);
  }

  function drawTree(depth) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height - 20;
    const trunkLen = Math.min(canvas.height * 0.21, 155);

    ctx.lineCap = 'round';
    branch(cx, cy, -Math.PI / 2, trunkLen, 0, depth);
  }

  function updateHUD(depth) {
    depthNum.textContent = depth;
    for (let i = 0; i < MAX_DEPTH; i++) {
      document.getElementById('pip-' + i).classList.toggle('active', i < depth);
    }
  }

  let currentDepth = 1;
  let rafPending = false;

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const newDepth = Math.min(MAX_DEPTH, Math.floor(scrollY / SCROLL_PER_LEVEL) + 1);

    if (newDepth !== currentDepth) {
      currentDepth = newDepth;
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          drawTree(currentDepth);
          updateHUD(currentDepth);
          rafPending = false;
        });
      }
    }

    // Fade intro text and scroll hint as user scrolls
    const fade = Math.min(1, scrollY / 280);
    intro.style.opacity = 1 - fade;
    scrollHint.style.opacity = 1 - fade;
  });

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    drawTree(currentDepth);
  }

  window.addEventListener('resize', resize);

  // Initial render
  resize();
  updateHUD(1);
</script>
</body>
</html>
