<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recursive Tree — Tesselate</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e2e8f0;
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    background: rgba(15,15,26,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #1e1e30;
  }

  .nav-brand {
    font-weight: 800;
    font-size: 1rem;
    background: linear-gradient(135deg, #7c3aed, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
  }

  .nav-divider { width: 1px; height: 20px; background: #2d2d50; }

  .nav-title { font-size: 0.9rem; color: #64748b; font-weight: 500; }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    pointer-events: none;
  }

  /* Very tall — gives the infinite scroll feeling */
  #scroll-area { height: 12000px; }

  #intro {
    position: fixed;
    top: 76px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.5s;
    white-space: nowrap;
  }

  #intro h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  #intro p { font-size: 0.82rem; color: #475569; }

  #scroll-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 0.78rem;
    color: #334155;
    pointer-events: none;
    transition: opacity 0.5s;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }

  #hud {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  #depth-label {
    font-size: 0.68rem;
    color: #334155;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #depth-value {
    font-size: 2rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Tesselate</a>
  <div class="nav-divider"></div>
  <span class="nav-title">Recursive Tree</span>
</nav>

<canvas id="c"></canvas>
<div id="scroll-area"></div>

<div id="intro">
  <h1>Recursive Tree</h1>
  <p>Each node spawns two children &nbsp;·&nbsp; scroll to descend</p>
</div>

<div id="scroll-hint">↓ &nbsp; scroll to recurse &nbsp; ↓</div>

<div id="hud">
  <div id="depth-label">Recursion Depth</div>
  <div id="depth-value">0</div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const depthEl = document.getElementById('depth-value');
  const intro   = document.getElementById('intro');
  const hint    = document.getElementById('scroll-hint');

  // Pixels of scroll between each recursion level
  const LEVEL_H  = 280;
  // Canvas-Y of the root node when scrollY = 0
  const TREE_TOP = 90;

  // Interpolate across a color palette by depth
  function depthColor(d, alpha) {
    const PALETTE_DEPTH = 12; // depth at which palette saturates
    const stops = [
      [130, 90,  50],  // warm brown   – root
      [34,  90,  34],  // dark green
      [22,  163, 74],  // green
      [16,  185, 129], // emerald
      [6,   182, 212], // cyan
      [148, 163, 184], // slate        – deep tips
    ];
    const t  = Math.min(1, d / PALETTE_DEPTH);
    const sc = t * (stops.length - 1);
    const i  = Math.min(Math.floor(sc), stops.length - 2);
    const f  = sc - i;
    const a  = stops[i], b = stops[i + 1];
    const r  = Math.round(a[0] + (b[0] - a[0]) * f);
    const g  = Math.round(a[1] + (b[1] - a[1]) * f);
    const bl = Math.round(a[2] + (b[2] - a[2]) * f);
    return alpha == null
      ? `rgb(${r},${g},${bl})`
      : `rgba(${r},${g},${bl},${alpha})`;
  }

  function draw(sy) {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.lineCap = 'round';

    // Which depth level is at the vertical center of the viewport
    const centerD = Math.max(0, Math.floor((sy + H / 2 - TREE_TOP) / LEVEL_H));
    depthEl.textContent = centerD;

    // Range of depth levels that overlap the visible canvas
    const dMin = Math.max(0, Math.floor((sy - TREE_TOP) / LEVEL_H) - 1);
    const dMax = Math.ceil((sy + H  - TREE_TOP) / LEVEL_H) + 1;

    let lastD = dMin; // track deepest level we actually drew

    for (let d = dMin; d <= dMax; d++) {
      const numNodes = Math.pow(2, d); // 2^d nodes at this depth
      const zoneW    = W / numNodes;   // horizontal slot per node

      // Stop when branches are thinner than half a pixel
      if (zoneW < 0.5) break;

      lastD = d;

      // Canvas Y positions for this level and its children
      const py = d       * LEVEL_H + TREE_TOP - sy;
      const cy = (d + 1) * LEVEL_H + TREE_TOP - sy;

      // Fade alpha as branches approach sub-pixel width
      const alpha = Math.min(1, (zoneW - 0.5) / 4 + 0.15);

      // Line thickness tapers exponentially with depth
      ctx.strokeStyle = depthColor(d, alpha);
      ctx.lineWidth   = Math.max(0.4, Math.pow(0.72, d) * 14);

      // Draw all 2^d pairs of branches in a single path (fast)
      ctx.beginPath();
      for (let i = 0; i < numNodes; i++) {
        const px  = (i + 0.5) * zoneW; // parent x
        const off = zoneW / 4;          // child x offset from parent
        ctx.moveTo(px, py); ctx.lineTo(px - off, cy); // left child
        ctx.moveTo(px, py); ctx.lineTo(px + off, cy); // right child
      }
      ctx.stroke();
    }

    // Below the last drawn level: soft glow suggesting infinite density
    const floorY = lastD * LEVEL_H + TREE_TOP - sy;
    if (floorY < H && floorY > -LEVEL_H) {
      const top  = Math.max(0, floorY);
      const grad = ctx.createLinearGradient(0, top, 0, Math.min(H, top + LEVEL_H * 1.5));
      grad.addColorStop(0,   depthColor(lastD, 0.55));
      grad.addColorStop(0.5, depthColor(lastD, 0.12));
      grad.addColorStop(1,   'rgba(15,15,26,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, top, W, H - top);
    }
  }

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    draw(window.scrollY);
  }

  let raf = false;
  window.addEventListener('scroll', () => {
    const sy   = window.scrollY;
    const fade = Math.min(1, sy / 300);
    intro.style.opacity = 1 - fade;
    hint.style.opacity  = 1 - fade;
    if (!raf) {
      raf = true;
      requestAnimationFrame(() => { draw(sy); raf = false; });
    }
  });

  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
